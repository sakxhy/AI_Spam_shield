<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Shield | Next-Gen Detection</title>
    <!-- Modern Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <!-- Animated background elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <div class="container">
        <header>
            <div class="logo-container">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
            </div>
            <h1>AI Spam Shield</h1>
            <p class="subtitle">Enter a message below to analyze its safety using advanced Natural Language Processing.</p>
        </header>

        <div class="glass-card">
            <form id="detectionForm">
                <div class="input-group">
                    <label for="messageInput">Message contents</label>
                    <textarea 
                        id="messageInput" 
                        placeholder="e.g., CONGRATULATIONS! You have won a $1000 gift card! Click here..."
                        required
                    ></textarea>
                </div>
                
                <button type="submit" id="submitBtn">
                    <span class="btn-text">Analyze Message <i class="fa-solid fa-wand-magic-sparkles"></i></span>
                    <div class="spinner disabled"></div>
                </button>
            </form>
            
            <!-- Result Area -->
            <div id="resultContainer" class="hidden">
                <div id="resultContent" class="result-content">
                    <div class="result-icon-wrapper">
                        <i id="resultIcon" class="fa-solid"></i>
                    </div>
                    <h2 id="resultTitle">Analysis Complete</h2>
                    <p id="resultText">Result details will appear here.</p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Powered by NLTK & Multinomial Naive Bayes</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
